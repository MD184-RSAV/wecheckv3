<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WeCheck - Assistant SAV</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#78be20">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; background: #f4f7f1; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #78be20; text-align: center; margin-bottom: 5px; font-size: 26px; }
        .subtitle { text-align: center; color: #666; font-style: italic; font-size: 0.85em; margin-bottom: 20px; }
        
        .store-selector-container { margin-bottom: 15px; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid #eee; }
        .store-selector-container label { display: block; font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #666; margin-bottom: 5px; letter-spacing: 0.5px; }
        select { width: 100%; padding: 10px; border-radius: 8px; border: 2px solid #eee; background: white; font-size: 15px; outline: none; cursor: pointer; transition: 0.3s; }
        select:focus { border-color: #78be20; }

        input { width: 100%; padding: 15px; box-sizing: border-box; border: 2px solid #eee; border-radius: 12px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #78be20; }
        .suggestion-list { list-style: none; padding: 0; margin: 5px 0; border-radius: 10px; background: white; max-height: 250px; overflow-y: auto; border: 1px solid #eee; display: none; }
        .suggestion-item { padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; font-size: 15px; }
        .suggestion-item:active { background-color: #f0f0f0; }
        
        .result-box { display: none; margin-top: 20px; padding: 15px; border-radius: 12px; background: #ffffff; border: 1px solid #e0e0e0; border-left: 6px solid #78be20; transition: 0.3s; }
        .danger-border { border-left: 6px solid #d9534f; background: #fff5f5; }
        .alert-destruction { display: none; background: #d9534f; color: white; text-align: center; font-weight: bold; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
        .hotline-box { display: none; background: #eef2f7; border: 1px dashed #337ab7; padding: 12px; border-radius: 8px; margin-bottom: 15px; color: #1e40af; font-weight: 500; font-size: 0.95em; }

        .label { font-weight: bold; color: #333; display: block; margin-top: 12px; font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.5px; }
        .value { color: #555; display: block; margin-bottom: 12px; font-size: 1.05em; line-height: 1.4; }
        .footer { text-align: center; font-size: 0.85em; color: #888; margin-top: 30px; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; }
        .status-loading { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>WeCheck ✅</h1>
    <div class="subtitle">L'assistant de prise en charge WeCARE</div>
    
    <div class="store-selector-container">
        <label for="choixMagasin">Magasin référent</label>
        <select id="choixMagasin" onchange="changerMagasin(this.value)">
            <option value="">Chargement des magasins...</option>
        </select>
    </div>

    <div id="loadingStatus" class="status-loading">Connexion à la base de données...</div>
    <input type="text" id="search" placeholder="Chargement..." oninput="rechercher()" disabled>
    <ul id="suggestions" class="suggestion-list"></ul>

    <div id="result" class="result-box">
        <div id="resAlertDestruction" class="alert-destruction">⚠️ PRODUIT À DÉTRUIRE SUR PLACE (NE PAS EXPÉDIER)</div>
        <div id="resHotlineBox" class="hotline-box">📞 Hotline obligatoire : <span id="resHotline"></span></div>

        <span class="label">📍 Mode Opératoire</span>
        <span id="resModop" class="value"></span>
        <span class="label">🛠️ Réparateur</span>
        <span id="resRep" class="value"></span>
        <span class="label">📦 Transporteur</span>
        <span id="resTrans" class="value"></span>
    </div>
</div>

<div class="footer">
    Créé par la team SAV Le Havre - 184
</div>

<script>
    // V4 : UN SEUL LIEN POUR TOUS LES GOUVERNER (L'Annuaire National)
    const annuaireCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRSpmXir02kXAMUX2LvbRA58TG_5cf7KWOJKdfFoQ7F_4o6pbNs6b-apBTnKF3tkAD2-fu9JLm08znS/pub?output=csv";
    
    let CONFIG_MAGASINS = {}; // Se remplira tout seul via l'annuaire
    let dataSav = {};

    function parseCSV(text) {
        let lines = []; let row = [""]; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i]; let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row); row = [''];
            } else { row[row.length - 1] += c; }
        }
        if (row.length > 1 || row[0] !== '') { lines.push(row); }
        return lines;
    }

    // Étape A : Charger l'annuaire et construire le menu déroulant au démarrage
    async function initialiserApplication() {
        const selectElement = document.getElementById('choixMagasin');
        try {
            const response = await fetch(annuaireCsvUrl);
            if (!response.ok) throw new Error("Impossible de charger l'annuaire national");
            const rawText = await response.text();
            const rows = parseCSV(rawText);

            selectElement.innerHTML = ''; // On vide le message de chargement
            
            // i = 1 pour sauter la ligne d'en-tête (Magasin, Url)
            for(let i = 1; i < rows.length; i++) {
                const columns = rows[i];
                if (columns.length >= 2 && columns[0].trim() !== "") {
                    const numMagasin = columns[0].trim();
                    const urlMagasin = columns[1].trim();
                    
                    // On remplit notre dictionnaire en mémoire
                    CONFIG_MAGASINS[numMagasin] = urlMagasin;

                    // On ajoute dynamiquement l'option dans le menu déroulant HTML
                    const opt = document.createElement('option');
                    opt.value = numMagasin;
                    opt.innerText = `Magasin ${numMagasin}`;
                    if (numMagasin === "184") opt.selected = true; // Le Havre sélectionné par défaut
                    selectElement.appendChild(opt);
                }
            }

            // Une fois le menu construit, on charge le magasin par défaut (Le Havre)
            chargerDonneesMagasin("184");

        } catch (error) {
            console.error(error);
            document.getElementById('loadingStatus').innerText = "❌ Erreur critique d'initialisation de l'annuaire.";
            document.getElementById('loadingStatus').style.color = "red";
        }
    }

    // Étape B : Charger les marques du magasin sélectionné
    async function chargerDonneesMagasin(numeroMagasin) {
        const inputField = document.getElementById('search');
        const statusField = document.getElementById('loadingStatus');
        const resultBox = document.getElementById('result');
        
        dataSav = {};
        inputField.value = "";
        inputField.disabled = true;
        inputField.placeholder = "Chargement...";
        resultBox.style.display = 'none';
        statusField.style.color = "#666";
        statusField.innerText = `Connexion au magasin ${numeroMagasin}...`;
        statusField.style.display = 'block';

        const sheetCsvUrl = CONFIG_MAGASINS[numeroMagasin];
        if (!sheetCsvUrl) {
            statusField.innerText = "❌ Erreur : Ce magasin n'existe pas dans l'annuaire.";
            statusField.style.color = "red";
            return;
        }
        
        try {
            const response = await fetch(sheetCsvUrl);
            if (!response.ok) throw new Error("Erreur de récupération");
            const rawText = await response.text();
            const rows = parseCSV(rawText);
            
            for(let i = 1; i < rows.length; i++) {
                const columns = rows[i];
                if (columns.length >= 4 && columns[0].trim() !== "") {
                    const marque = columns[0].trim();
                    dataSav[marque] = {
                        mod: columns[1] ? columns[1].trim() : "N/A",
                        rep: columns[2] ? columns[2].trim() : "N/A",
                        tra: columns[3] ? columns[3].trim() : "N/A",
                        hotline: columns[4] ? columns[4].trim() : "",
                        destruction: columns[5] ? columns[5].trim().toUpperCase() === "TRUE" : false
                    };
                }
            }
            statusField.style.display = 'none';
            inputField.placeholder = "Rechercher une marque...";
            inputField.disabled = false;
        } catch (error) {
            console.error(error);
            statusField.innerText = "❌ Erreur de chargement. Vérifiez la publication du Sheet magasin.";
            statusField.style.color = "red";
        }
    }

    function changerMagasin(numeroMagasin) {
        if(numeroMagasin) chargerDonneesMagasin(numeroMagasin);
    }

    function normaliser(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim(); }
    
    function rechercher() {
        const input = normaliser(document.getElementById('search').value);
        const list = document.getElementById('suggestions');
        list.innerHTML = '';
        if (input.length < 1) { list.style.display = 'none'; return; }
        const matches = Object.keys(dataSav).filter(k => normaliser(k).includes(input));
        if (matches.length > 0) {
            list.style.display = 'block';
            matches.forEach(m => {
                const li = document.createElement('li');
                li.className = 'suggestion-item';
                li.innerText = m;
                li.onclick = () => afficher(m);
                list.appendChild(li);
            });
        } else { list.style.display = 'none'; }
    }
    
    function afficher(nom) {
        const info = dataSav[nom];
        const resultBox = document.getElementById('result');
        const alertDestruction = document.getElementById('resAlertDestruction');
        const hotlineBox = document.getElementById('resHotlineBox');

        document.getElementById('resModop').innerText = info.mod;
        document.getElementById('resRep').innerText = info.rep;
        document.getElementById('resTrans').innerText = info.tra;
        
        if (info.hotline !== "") {
            document.getElementById('resHotline').innerText = info.hotline;
            hotlineBox.style.display = "block";
        } else {
            hotlineBox.style.display = "none";
        }

        if (info.destruction) {
            resultBox.classList.add('danger-border');
            alertDestruction.style.display = "block";
        } else {
            resultBox.classList.remove('danger-border');
            alertDestruction.style.display = "none";
        }

        resultBox.style.display = 'block';
        document.getElementById('suggestions').style.display = 'none';
        document.getElementById('search').value = nom;
    }

    // Au chargement, on lance d'abord la lecture de l'annuaire national
    window.onload = () => {
        initialiserApplication();
    };
</script>
</body>
</html>
